<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motopesca Marine & Agro</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS externo -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body class="bg-[#F8FAFC] text-[#1E2937]">
    <!-- HEADER PROFESIONAL -->
    <header class="bg-[#0A2540] text-white fixed w-full z-50 shadow-md">
      <div
        class="container mx-auto flex justify-between items-center px-6 py-3"
      >
        <!-- LOGO + MARCA -->
        <div class="flex items-center gap-4">
          <img
            src="assets/images/logo.png"
            class="h-20 md:h-24 object-contain"
          />

          <div class="leading-tight hidden sm:block">
            <h1 class="text-2xl font-extrabold tracking-wide">MOTOPESCA</h1>
            <span class="text-[#00BFFF] text-sm"> Marine & Agro </span>
          </div>
        </div>

        <!-- NAV -->
        <nav class="hidden md:flex gap-6 font-medium">
          <a href="#" class="hover:text-[#00BFFF]">Inicio</a>
          <a href="#" class="hover:text-[#00BFFF]">Repuestos</a>
          <a href="#" class="hover:text-[#00BFFF]">Agro</a>
          <a href="#" class="hover:text-[#00BFFF]">Herramientas</a>
          <a href="#" class="hover:text-[#00BFFF]">Ofertas</a>
          <a href="#" class="hover:text-[#00BFFF]">Contacto</a>
        </nav>

        <!-- CARRITO -->
        <button
          id="cart-btn"
          class="bg-[#FF7A00] px-4 py-2 rounded-lg shadow hover:bg-orange-600 transition"
        >
          🛒 <span id="cart-count">0</span>
        </button>
      </div>
    </header>

    <!-- HERO -->
    <section class="pt-32 bg-[#0A2540] text-white text-center py-20">
      <h1 class="text-4xl md:text-6xl font-bold mb-4">
        Potencia para el Agua y el Campo
      </h1>

      <p class="text-lg opacity-80 mb-6">
        Repuestos, motores y maquinaria profesional
      </p>

      <div class="flex justify-center gap-4">
        <button
          class="bg-[#FF7A00] px-6 py-3 rounded-lg font-bold hover:scale-105 transition"
        >
          Ver Catálogo
        </button>

        <a
          href="https://wa.me/573108394870"
          class="bg-green-500 px-6 py-3 rounded-lg font-bold"
        >
          WhatsApp
        </a>
      </div>
    </section>

    <!-- PRODUCTOS -->
    <section class="container mx-auto py-16 px-6">
      <h2 class="text-3xl font-bold text-center mb-10">Productos Destacados</h2>

      <div
        id="product-list"
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
      ></div>
    </section>

    <!-- CARRITO -->
    <div
      id="cart"
      class="fixed right-0 top-0 w-80 h-full bg-white shadow-xl p-6 hidden z-50"
    >
      <h2 class="font-bold text-xl mb-4">Carrito</h2>

      <div id="cart-items"></div>

      <p class="mt-4 font-bold text-lg">Total: $<span id="total">0</span></p>

      <a
        id="checkout-btn"
        class="block mt-4 bg-green-500 text-white py-3 text-center rounded-lg"
      >
        Comprar por WhatsApp
      </a>
    </div>

    <!-- BOTÓN WHATSAPP FLOTANTE -->
    <a
      href="https://wa.me/573108394870"
      class="fixed bottom-5 right-5 bg-green-500 text-white p-4 rounded-full shadow-lg text-xl"
    >
      💬
    </a>

    <!-- JS -->
    <script src="assets/js/products.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
